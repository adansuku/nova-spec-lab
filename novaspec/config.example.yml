# nova-spec — configuración del framework (plantilla)
# Copia este archivo a novaspec/config.yml y rellena con tus datos.
# novaspec/config.yml está gitignored; no lo subas al repo.

branch:
  pattern: "{type}/{ticket}-{slug}"
  types:
    bugfix: bugfix
    hotfix: hotfix
    feature: feature
    documentation: docs
    refactor: refactor
    chore: chore
    architecture: arch
  ticket_case: upper    # upper | lower
  base: develop            # rama base del flujo (checkout en /nova-start, --base en /nova-wrap)

jira:
  skill: ""                       # nombre de la skill para bajar tickets; déjalo vacío para deshabilitar
  url: https://your-workspace.atlassian.net
  project: PROJ
  email: you@example.com
  token: ${JIRA_API_TOKEN}        # crea el token en id.atlassian.com/manage-profile/security/api-tokens
