# nova-spec — configuración del framework
branch:
  pattern: "{type}/{ticket}-{slug}"
  types:
    bugfix: bugfix
    hotfix: hotfix
    feature: feature
    documentation: docs
    refactor: refactor
    chore: chore
    architecture: arch
  ticket_case: upper    # upper | lower
  base: develop            # rama base del flujo (checkout en /nova-start, --base en /nova-wrap)

jira:
  skill: jira-integration         # nombre de la skill para bajar tickets; déjalo vacío para deshabilitar
  url: https://tu-org.atlassian.net
  project: NOVA
  email: tu@email.com
  token: ${JIRA_API_TOKEN}        # crea el token en id.atlassian.com/manage-profile/security/api-tokens
